function celestialPos(currentT, riseT, setT) {
    let span = setT - riseT;
    if (span < 0) span += 24;
    let elapsed = currentT - riseT;
    if (elapsed < 0) elapsed += 24;
    const progress = Math.max(0, Math.min(1, elapsed / span));
    const x = 10 + progress * 80;
    const arcHeight = Math.sin(progress * Math.PI);
    const y = 8 + arcHeight * 55;
    return { x, y, progress };
}

function generateStars() {
    const c = document.getElementById('zenStars'); if (!c) return;
    c.innerHTML = '';
    for (let i = 0; i < 100; i++) {
        const s = document.createElement('div');
        s.className = 'zen-star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 65 + '%';
        const dur = 2 + Math.random() * 5;
        const delay = Math.random() * 6;
        s.style.setProperty('--tw-dur', dur + 's');
        s.style.setProperty('--tw-delay', delay + 's');
        const size = 1 + Math.random() * 2.5;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        c.appendChild(s);
    }
}

function updateZenScene() {
    const now = new Date();
    const hour = now.getHours(), min = now.getMinutes();
    const tNow = hour + min / 60;
    const phase = getTimePhase(hour, min);
    const theme = SKY_THEMES[phase];

    document.getElementById('zenBg').style.background = theme.bg;

    const mts = document.querySelectorAll('.zen-mountain');
    theme.mt.forEach((c, i) => { if (mts[i]) mts[i].style.borderBottomColor = c; });

    const starsEl = document.getElementById('zenStars');
    starsEl.style.opacity = phase === 'night' ? '1' : phase === 'dusk' ? '0.7' : phase === 'dawn' ? '0.3' : '0';

    const cloudsEl = document.getElementById('zenClouds');
    const isDaytime = ['morning','noon','afternoon'].includes(phase);
    cloudsEl.style.opacity = isDaytime ? '1' : phase === 'dawn' || phase === 'sunset' ? '0.4' : '0';

    const fogEl = document.getElementById('zenFog');
    fogEl.style.opacity = (phase === 'dawn' || phase === 'dusk') ? '1' : isDaytime ? '0.3' : '0.5';

    const sunEl = document.getElementById('zenSun');
    const sunRise = 6, sunSet = 18.5;
    const sunVisible = tNow >= sunRise && tNow <= sunSet;
    if (sunVisible) {
        const sp = celestialPos(tNow, sunRise, sunSet);
        sunEl.style.left = sp.x + '%';
        sunEl.style.bottom = sp.y + '%';
        sunEl.style.opacity = '1';
        sunEl.style.transform = 'translate(-50%, 50%)';
        const horizonProx = 1 - Math.sin(sp.progress * Math.PI);
        sunEl.style.boxShadow = `0 0 ${60 + horizonProx * 40}px ${20 + horizonProx * 30}px rgba(251,191,36,${0.3 + horizonProx * 0.3})`;
    } else {
        sunEl.style.opacity = '0';
    }

    const moonEl = document.getElementById('zenMoon');
    const moonRise = 18.5, moonSet = 6;
    const moonVisible = tNow >= moonRise || tNow <= moonSet;
    if (moonVisible) {
        const mp = celestialPos(tNow, moonRise, moonSet);
        moonEl.style.left = mp.x + '%';
        moonEl.style.bottom = mp.y + '%';
        moonEl.style.opacity = '1';
        moonEl.style.transform = 'translate(-50%, 50%)';
    } else {
        moonEl.style.opacity = '0';
    }

    const clockEl = document.getElementById('zenClock');
    const dateEl = document.getElementById('zenDate');
    if (clockEl) clockEl.style.color = theme.text;
    if (dateEl) clockEl.style.textShadow = isDaytime ? '0 2px 20px rgba(0,0,0,0.1)' : '0 2px 40px rgba(0,0,0,0.3)';
}

function updateZenClock() {
    const now = new Date();
    const zenCl = document.getElementById('zenClock');
    if (zenCl) zenCl.textContent = [now.getHours(), now.getMinutes(), now.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');

    const zenDt = document.getElementById('zenDate');
    if (zenDt) {
        zenDt.textContent = currentLang === 'zh'
            ? `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 周${t('weekDays')[now.getDay()]}`
            : now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    // Phase label in zen mode
    const phaseLabel = document.getElementById('zenPhaseLabel');
    if (phaseLabel) {
        const phaseKey = getCurrentPhaseKey();
        const phaseObj = DAY_PHASES.find(p => p.key === phaseKey);
        if (phaseObj) phaseLabel.textContent = `${phaseObj.icon} ${t(phaseObj.i18n)}`;
    }

    const zenWt = document.getElementById('zenWorkTimer');
    const focusTask = getActiveFocusTask();
    if (focusTask) {
        if (zenWt) zenWt.textContent = formatSecs(focusTask.focusSecs || 0);
    } else {
        const rec = getTodayWork();
        if (rec.currentStart) {
            const runMs = Date.now() - rec.currentStart;
            const sessMs = rec.sessions.reduce((s, x) => s + x.duration * 60000, 0);
            if (zenWt) zenWt.textContent = formatHMS(sessMs + runMs);
        }
    }

    updateZenScene();
}

    document.body.style.overflow = 'hidden';
    initAudio();
    startSound(currentSound);
    if (!audioMuted) setAudioVolume(document.getElementById('zenVolume').value / 100);
}

function exitZenMode() {
    document.getElementById('zenOverlay').classList.remove('active');
    if (zenClockInterval) { clearInterval(zenClockInterval); zenClockInterval = null; }
    document.body.style.overflow = '';
    zenActive = false;
    stopAllSounds();
}

// ======================== STREAK ========================
function calculateStreak() {
    let streak = 0;
    const today = new Date();
    const todayStr = getTodayStr();
    const todayHasWork = workMap.has(todayStr) && (workMap.get(todayStr).totalMinutes > 0 || workMap.get(todayStr).currentStart);
    let checkDate = new Date(today);
    if (!todayHasWork) {
        checkDate.setDate(checkDate.getDate() - 1);
    }
    while (true) {
        const ds = toLocalDateStr(checkDate);
        const rec = workMap.get(ds);
        if (rec && rec.totalMinutes > 0) {
            streak++;
            checkDate.setDate(checkDate.getDate() - 1);
        } else {
            break;
        }
    }
    if (todayHasWork && streak === 0) streak = 0; // currentStart but no totalMinutes yet counts visually
    return streak;
}

function updateStreakDisplay() {
    const badge = document.getElementById('streakBadge');
    const streak = calculateStreak();
    if (streak > 0) {
        badge.style.display = 'inline-flex';
        badge.textContent = '\uD83D\uDD25 ' + t('streak').replace('{n}', streak);
    } else {
        badge.style.display = 'none';
    }
}

// ======================== FLASH NOTES ========================
function addFlashNote() {
    const input = document.getElementById('flashNoteInput');
    const text = input.value.trim();
    if (!text) return;
    const now = new Date();
    const note = {
        id: Date.now() + Math.random(),
        text: text,
        dateStr: getTodayStr(),
        time: now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}),
        createdAt: now.toISOString()
    };
    flashNotes.push(note);
    saveAll();
    input.value = '';
    renderFlashNotes();
}

function deleteFlashNote(id) {
    flashNotes = flashNotes.filter(n => n.id !== id);
    saveAll();
    renderFlashNotes();
}

function renderFlashNotes() {
    const container = document.getElementById('flashNotesList');
    if (!container) return;
    const todayNotes = flashNotes.filter(n => n.dateStr === getTodayStr()).sort((a, b) => b.id - a.id);
    if (!todayNotes.length) {
        container.innerHTML = `<div class="text-center text-zinc-300 py-3 text-xs">${t('noFlashNotes')}</div>`;
        return;
    }
    container.innerHTML = todayNotes.map((n, i) => `
        <div class="flash-note-item" style="animation-delay:${i * 0.04}s">
            <span class="flash-time">${n.time}</span>
            <span class="flash-text">${escapeHtml(n.text)}</span>
            <span class="flash-del" onclick="deleteFlashNote(${n.id})" title="Delete"><i class="fas fa-times"></i></span>
        </div>
    `).join('');
}

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function showFlashHistory() {
    const grouped = {};
    flashNotes.forEach(n => {
        if (!grouped[n.dateStr]) grouped[n.dateStr] = [];
        grouped[n.dateStr].push(n);
    });
    const dates = Object.keys(grouped).sort().reverse();
    const container = document.getElementById('flashHistoryContent');
    if (!dates.length) {
        container.innerHTML = `<div class="text-center text-zinc-400 py-4 text-sm">${t('noFlashNotes')}</div>`;
    } else {
        container.innerHTML = dates.map(date => {
            const notes = grouped[date].sort((a, b) => b.id - a.id);
            return `
                <div class="mb-2">
                    <div class="text-xs font-semibold text-zinc-500 mb-1.5 flex items-center gap-1.5">
                        <i class="fas fa-calendar-day text-indigo-300"></i> ${date}
                        <span class="text-zinc-300 font-normal">(${notes.length})</span>
                    </div>
                    <div class="space-y-1">
                        ${notes.map(n => `
                            <div class="flex items-start gap-2 text-xs p-2 bg-zinc-50 rounded-md">
                                <span class="text-zinc-400 flex-shrink-0" style="font-variant-numeric:tabular-nums">${n.time}</span>
                                <span class="text-zinc-600">${escapeHtml(n.text)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }).join('');
    }
    document.getElementById('flashHistoryModal').classList.remove('hidden');
}

// ======================== DAY PHASES ========================
const DAY_PHASES = [
    { key: 'morning',   icon: '💪', i18n: 'phaseMorning',   startH: 6,  endH: 12 },
    { key: 'afternoon', icon: '☕', i18n: 'phaseAfternoon', startH: 12, endH: 18 },
    { key: 'evening',   icon: '🔥', i18n: 'phaseEvening',   startH: 18, endH: 23 },
    { key: 'latenight', icon: '🧘', i18n: 'phaseLateNight', startH: 23, endH: 6  },
];

function getPhaseMinutes(phase, rec) {
    if (!rec || !rec.sessions || !rec.sessions.length) return 0;
    let total = 0;
    rec.sessions.forEach(s => {
        if (!s.startTs || !s.endTs) return;
        const start = new Date(s.startTs);
        const end = new Date(s.endTs);
        // For each minute of the session, check if it falls in this phase
        let cur = new Date(start);
        while (cur < end) {
            const h = cur.getHours();
            let inPhase = false;
            if (phase.startH < phase.endH) {
                inPhase = (h >= phase.startH && h < phase.endH);
            } else {
                // wraps midnight (23-6)
                inPhase = (h >= phase.startH || h < phase.endH);
            }
            if (inPhase) total++;
            cur = new Date(cur.getTime() + 60000); // advance 1 min
        }
    });
    return total;
}

function getCurrentPhaseKey() {
    const h = new Date().getHours();
    if (h >= 6 && h < 12) return 'morning';
    if (h >= 12 && h < 18) return 'afternoon';
    if (h >= 18 && h < 23) return 'evening';
    return 'latenight';
}

function renderDayPhases() {
    const bar = document.getElementById('dayPhasesBar');
    if (!bar) return;
    const rec = workMap.get(getTodayStr());
    const currentPhase = getCurrentPhaseKey();
    const isWorking = rec && !!rec.currentStart;
    const rangeStr = (p) => {
        const sh = String(p.startH).padStart(2,'0');
        const eh = String(p.endH).padStart(2,'0');
        return `${sh}:00-${eh}:00`;
    };
    bar.innerHTML = DAY_PHASES.map(p => {
        const mins = getPhaseMinutes(p, rec);
        const isActive = p.key === currentPhase;
        const worked = mins > 0;
        const locked = !isActive && !worked;
        let statusHtml;
        if (isActive && !isWorking && !worked) {
            statusHtml = `<div class="phase-status" style="color:var(--accent)"><i class="fas fa-play text-[0.5rem] mr-0.5"></i>${currentLang === 'zh' ? '点击专注' : 'Click to focus'}</div>`;
        } else if (isActive && isWorking) {
            statusHtml = `<div class="phase-status" style="color:var(--accent)"><i class="fas fa-circle text-[0.4rem] mr-0.5 animate-pulse"></i>${currentLang === 'zh' ? '专注中' : 'Focusing'}</div>`;
        } else if (worked) {
            statusHtml = `<div class="phase-status worked"><i class="fas fa-check-circle text-[0.5rem] mr-0.5"></i>${t('phaseWorked').replace('{n}', mins)}</div>`;
        } else {
            statusHtml = `<div class="phase-status idle">${locked ? '🔒' : t('phaseIdle')}</div>`;
        }
        return `
            <div class="phase-card ${isActive ? 'phase-active' : ''} ${locked ? 'phase-locked' : ''}" ${isActive && !isWorking ? 'onclick="workStartClick()"' : ''}>
                <div class="phase-icon">${p.icon}</div>
                <div class="phase-name">${t(p.i18n)}</div>
                <div class="phase-range">${rangeStr(p)}</div>
                ${statusHtml}
            </div>`;
    }).join('');
}

// ======================== INIT ========================
function init() {
    loadAll();
    // Clean up old per-task timer state from previous version
    tasks.forEach(tk => {
        delete tk.timerInterval;
        delete tk.isTimingActive;
        delete tk.lastStartTimeStr;
        delete tk.lastFocusSecsBeforeStart;
    });
    tasks.forEach(tk => { if(tk.status==="未开始")tk.status="todo"; else if(tk.status==="进行中")tk.status="doing"; else if(tk.status==="已完成")tk.status="done"; });
    saveAll();
    applyI18n();
    renderTasks();

    startHeaderClock();

    const rec = getTodayWork();
    if (rec.currentStart) {
        startWorkLiveTimer();
        enterZenMode();
    }
    updateWorkUI();
    updateFocusTodayUI();
    updateStreakDisplay();
    renderDayPhases();

    document.getElementById("langToggleBtn").onclick = toggleLang;
    document.getElementById("workStartBtn").onclick = workStartClick;
    document.getElementById("workStopBtn").onclick = workStopClick;
    document.getElementById("zenExitBtn").onclick = () => { workStopClick(); };
    initAudioControls();
    document.getElementById("addTaskBtn").onclick = () => {
        const v=document.getElementById("newTaskInput").value.trim();
        if(v){tasks.push({id:Date.now()+Math.random(),text:v,status:"todo",createdAt:new Date().toISOString(),focusSecs:0});saveAll();renderTasks();updateStatsAndCalendar();document.getElementById("newTaskInput").value="";}
    };
    document.getElementById("newTaskInput").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("addTaskBtn").click(); });
    document.getElementById("viewMoodHistoryBtn").onclick = showMoodHistory;
    document.getElementById("viewTaskHistoryBtn").onclick = showTaskHistory;
    document.getElementById("closeMoodModal").onclick = () => document.getElementById("moodModal").classList.add("hidden");
    document.getElementById("closeTaskModal").onclick = () => document.getElementById("taskHistoryModal").classList.add("hidden");
    document.getElementById("exportDataBtn").onclick = exportData;
    document.getElementById("importDataBtn").onclick = () => document.getElementById("importFile").click();
    document.getElementById("importFile").onchange = e => importData(e.target.files[0]);
    document.getElementById("clearAllDataBtn").onclick = () => { if(confirm(t('clearAllConfirm'))&&confirm(t('clearAllConfirm2'))){localStorage.clear();location.reload();} };
    // clearTimelineBtn removed
    document.querySelectorAll(".mood-btn").forEach(btn => btn.addEventListener("click", () => recordMood(btn.getAttribute("data-mood"))));
    document.getElementById("inspirationText").addEventListener("input", () => { inspirationMap.set(getTodayStr(), document.getElementById("inspirationText").value); saveAll(); });
    document.getElementById("inspirationText").value = inspirationMap.get(getTodayStr()) || "";
    // Flash notes
    document.getElementById("flashNoteAddBtn").onclick = addFlashNote;
    document.getElementById("flashNoteInput").addEventListener("keydown", e => { if(e.key==="Enter") addFlashNote(); });
    document.getElementById("flashHistoryBtn").onclick = showFlashHistory;
    document.getElementById("closeFlashModal").onclick = () => document.getElementById("flashHistoryModal").classList.add("hidden");
    renderFlashNotes();
    document.getElementById("dailyThemeInput").addEventListener("change", () => saveAll());
    ['moodModal','taskHistoryModal','flashHistoryModal'].forEach(id => { document.getElementById(id).addEventListener("click", e => { if(e.target.id===id) e.target.classList.add("hidden"); }); });
    updateStatsAndCalendar("week");
}
init();
</script>
